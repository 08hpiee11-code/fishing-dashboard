name: Update fishing data and deploy site

on:
  schedule:
    # 06:00 / 12:00 / 18:00 JST == 21:00 / 03:00 / 09:00 UTC
    - cron: "0 21,3,9 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch latest readings
        timeout-minutes: 8
        run: python3 scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "fishing-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: update readings $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M %Z')"
            git push
          fi

  deploy:
    needs: update-data
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - id: deployment
        uses: actions/deploy-pages@v4
