<title>釣り場モニター</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="松原ダム・芹川ダム・阿武川ダム・遠賀川・菅野ダム・北川ダムの貯水位・貯水率・天気・降雨量を記録するダッシュボード">
<style>
  :root {
    --surface-1:      #fcfcfb;
    --page:           #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --baseline:       #c3c2b7;
    --border:         rgba(11,11,11,0.10);
    --series-blue:    #2a78d6;
    --series-blue-wash: rgba(42,120,214,0.10);
    --good:           #006300;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --surface-1:      #1a1a19;
      --page:           #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --baseline:       #383835;
      --border:         rgba(255,255,255,0.10);
      --series-blue:    #3987e5;
      --series-blue-wash: rgba(57,135,229,0.14);
      --good:           #0ca30c;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--page);
    color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    -webkit-text-size-adjust: 100%;
  }
  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 20px 16px 48px;
  }
  header.page-head {
    margin-bottom: 20px;
  }
  header.page-head h1 {
    font-size: 22px;
    margin: 0 0 4px;
    font-weight: 700;
  }
  header.page-head p {
    margin: 0;
    color: var(--text-secondary);
    font-size: 13px;
  }
  #updated-at {
    color: var(--text-muted);
    font-size: 12px;
    margin-top: 6px;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  @media (min-width: 640px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 980px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }
  .card {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 2px;
  }
  .card-head h2 {
    font-size: 16px;
    margin: 0;
    font-weight: 700;
  }
  .badge {
    font-size: 11px;
    color: var(--text-muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 8px;
    white-space: nowrap;
  }
  .obs-time {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .stat-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 2px;
  }
  .stat-value {
    font-size: 30px;
    font-weight: 600;
    line-height: 1.1;
  }
  .stat-unit {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .stat-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .chart-wrap {
    position: relative;
    margin: 6px 0 10px;
  }
  svg.trend {
    display: block;
    width: 100%;
    height: 92px;
    overflow: visible;
  }
  .tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 11px;
    color: var(--text-primary);
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
    white-space: nowrap;
    opacity: 0;
    transform: translate(-50%, -100%);
    top: 0; left: 0;
    transition: opacity 0.08s;
  }
  .tooltip .t-val { font-weight: 700; }
  .tooltip .t-date { color: var(--text-muted); }
  .sub-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 14px;
    font-size: 12px;
    color: var(--text-secondary);
    border-top: 1px solid var(--gridline);
    padding-top: 10px;
  }
  .sub-stats .item b {
    color: var(--text-primary);
    font-weight: 600;
  }
  .weather-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    margin-top: 8px;
    color: var(--text-secondary);
  }
  .weather-row .icon { font-size: 18px; }
  .empty-note {
    color: var(--text-muted);
    font-size: 12px;
    padding: 20px 0;
    text-align: center;
  }
  footer {
    margin-top: 28px;
    color: var(--text-muted);
    font-size: 11px;
    line-height: 1.6;
  }
  footer a { color: var(--text-muted); }
</style>

<div class="wrap">
  <header class="page-head">
    <h1>釣り場モニター</h1>
    <p>松原ダム・芹川ダム・阿武川ダム・遠賀川・菅野ダム・北川ダムの貯水位／貯水率・天気・降雨量を記録。過去30日分を保存。</p>
    <div id="updated-at">読み込み中…</div>
  </header>

  <div class="grid" id="grid">
    <div class="empty-note">データを読み込み中…</div>
  </div>

  <footer>
    データ更新: 毎日 6:00 / 12:00 / 18:00（日本時間）。水位・貯水率は国土交通省「川の防災情報」、大分県・山口県の河川防災情報システムより取得。天気はOpen-Meteoより取得。
  </footer>
</div>

<script>
const WEATHER_MAP = {
  0: ["快晴", "☀️"], 1: ["晴れ", "🌤️"], 2: ["一部曇り", "⛅"], 3: ["曇り", "☁️"],
  45: ["霧", "🌫️"], 48: ["霧氷", "🌫️"],
  51: ["小雨", "🌦️"], 53: ["霧雨", "🌦️"], 55: ["強い霧雨", "🌧️"],
  56: ["着氷性の霧雨", "🌧️"], 57: ["着氷性の霧雨", "🌧️"],
  61: ["雨", "🌧️"], 63: ["雨", "🌧️"], 65: ["強い雨", "🌧️"],
  66: ["着氷性の雨", "🌧️"], 67: ["着氷性の雨", "🌧️"],
  71: ["雪", "🌨️"], 73: ["雪", "🌨️"], 75: ["強い雪", "🌨️"], 77: ["霧雪", "🌨️"],
  80: ["にわか雨", "🌦️"], 81: ["にわか雨", "🌦️"], 82: ["激しいにわか雨", "🌧️"],
  85: ["にわか雪", "🌨️"], 86: ["激しいにわか雪", "🌨️"],
  95: ["雷雨", "⛈️"], 96: ["雷雨（ひょう）", "⛈️"], 99: ["雷雨（ひょう）", "⛈️"],
};

function fmtDateTime(iso) {
  if (!iso) return "―";
  const d = new Date(iso);
  const mm = d.getMonth() + 1, dd = d.getDate();
  const hh = String(d.getHours()).padStart(2, "0");
  const mi = String(d.getMinutes()).padStart(2, "0");
  return `${mm}/${dd} ${hh}:${mi}`;
}

function fmtNum(v, digits = 1) {
  if (v === null || v === undefined || Number.isNaN(v)) return "―";
  return v.toFixed(digits);
}

// pick the metric that best represents "how full / how high" this spot is
function primaryMetric(readings) {
  const has = (key) => readings.some(r => r[key] !== null && r[key] !== undefined);
  if (has("storage_rate_pct")) return { key: "storage_rate_pct", label: "貯水率", unit: "%" };
  if (has("water_level_m")) return { key: "water_level_m", label: "貯水位／水位", unit: "m" };
  if (has("storage_volume_1000m3")) return { key: "storage_volume_1000m3", label: "貯水量", unit: "千m³" };
  return { key: "storage_rate_pct", label: "貯水率", unit: "%" };
}

function buildChart(container, tooltipEl, readings, metric) {
  const points = readings
    .map(r => ({ t: new Date(r.time), v: r[metric.key] }))
    .filter(p => p.v !== null && p.v !== undefined && !Number.isNaN(p.v));

  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("class", "trend");
  svg.setAttribute("preserveAspectRatio", "none");

  if (points.length < 2) {
    container.appendChild(svg);
    return;
  }

  const W = 300, H = 92, padTop = 10, padBottom = 8, padX = 4;
  svg.setAttribute("viewBox", `0 0 ${W} ${H}`);

  const values = points.map(p => p.v);
  let min = Math.min(...values), max = Math.max(...values);
  if (min === max) { min -= 1; max += 1; }
  const pad = (max - min) * 0.08;
  min -= pad; max += pad;

  const tMin = points[0].t.getTime();
  const tMax = points[points.length - 1].t.getTime();
  const xScale = (t) => {
    if (tMax === tMin) return padX;
    return padX + ((t - tMin) / (tMax - tMin)) * (W - padX * 2);
  };
  const yScale = (v) => padTop + (1 - (v - min) / (max - min)) * (H - padTop - padBottom);

  // gridline (baseline at bottom)
  const base = document.createElementNS(svgNS, "line");
  base.setAttribute("x1", 0); base.setAttribute("x2", W);
  base.setAttribute("y1", H - padBottom); base.setAttribute("y2", H - padBottom);
  base.setAttribute("stroke", "var(--gridline)");
  base.setAttribute("stroke-width", "1");
  svg.appendChild(base);

  // area wash
  const areaPts = points.map(p => `${xScale(p.t.getTime())},${yScale(p.v)}`).join(" ");
  const area = document.createElementNS(svgNS, "polygon");
  area.setAttribute("points", `${padX},${H - padBottom} ${areaPts} ${W - padX},${H - padBottom}`);
  area.setAttribute("fill", "var(--series-blue-wash)");
  svg.appendChild(area);

  // line
  const line = document.createElementNS(svgNS, "polyline");
  line.setAttribute("points", areaPts);
  line.setAttribute("fill", "none");
  line.setAttribute("stroke", "var(--series-blue)");
  line.setAttribute("stroke-width", "2");
  line.setAttribute("stroke-linejoin", "round");
  line.setAttribute("stroke-linecap", "round");
  svg.appendChild(line);

  // end marker + direct label
  const lastPt = points[points.length - 1];
  const lx = xScale(lastPt.t.getTime()), ly = yScale(lastPt.v);
  const dot = document.createElementNS(svgNS, "circle");
  dot.setAttribute("cx", lx); dot.setAttribute("cy", ly);
  dot.setAttribute("r", 4);
  dot.setAttribute("fill", "var(--series-blue)");
  dot.setAttribute("stroke", "var(--surface-1)");
  dot.setAttribute("stroke-width", "2");
  svg.appendChild(dot);

  // crosshair (hidden until hover)
  const crosshair = document.createElementNS(svgNS, "line");
  crosshair.setAttribute("y1", padTop - 4);
  crosshair.setAttribute("y2", H - padBottom);
  crosshair.setAttribute("stroke", "var(--baseline)");
  crosshair.setAttribute("stroke-width", "1");
  crosshair.setAttribute("opacity", "0");
  svg.appendChild(crosshair);

  const hoverDot = document.createElementNS(svgNS, "circle");
  hoverDot.setAttribute("r", 4);
  hoverDot.setAttribute("fill", "var(--series-blue)");
  hoverDot.setAttribute("stroke", "var(--surface-1)");
  hoverDot.setAttribute("stroke-width", "2");
  hoverDot.setAttribute("opacity", "0");
  svg.appendChild(hoverDot);

  // transparent hit layer, bigger than the visual marks
  const hit = document.createElementNS(svgNS, "rect");
  hit.setAttribute("x", 0); hit.setAttribute("y", 0);
  hit.setAttribute("width", W); hit.setAttribute("height", H);
  hit.setAttribute("fill", "transparent");
  svg.appendChild(hit);

  function nearestPoint(clientX) {
    const rect = svg.getBoundingClientRect();
    const relX = ((clientX - rect.left) / rect.width) * W;
    let best = points[0], bestDist = Infinity;
    for (const p of points) {
      const d = Math.abs(xScale(p.t.getTime()) - relX);
      if (d < bestDist) { bestDist = d; best = p; }
    }
    return best;
  }

  function showTooltip(clientX, clientY, p) {
    const x = xScale(p.t.getTime()), y = yScale(p.v);
    crosshair.setAttribute("x1", x); crosshair.setAttribute("x2", x);
    crosshair.setAttribute("opacity", "1");
    hoverDot.setAttribute("cx", x); hoverDot.setAttribute("cy", y);
    hoverDot.setAttribute("opacity", "1");

    const wrapRect = container.getBoundingClientRect();
    tooltipEl.style.left = (clientX - wrapRect.left) + "px";
    tooltipEl.style.top = (y / H) * container.clientHeight + "px";
    tooltipEl.innerHTML = "";
    const dateEl = document.createElement("div");
    dateEl.className = "t-date";
    dateEl.textContent = `${p.t.getMonth()+1}/${p.t.getDate()} ${String(p.t.getHours()).padStart(2,"0")}:${String(p.t.getMinutes()).padStart(2,"0")}`;
    const valEl = document.createElement("div");
    valEl.className = "t-val";
    valEl.textContent = `${metric.label} ${p.v.toFixed(2)}${metric.unit}`;
    tooltipEl.appendChild(dateEl);
    tooltipEl.appendChild(valEl);
    tooltipEl.style.opacity = "1";
  }

  function hideTooltip() {
    crosshair.setAttribute("opacity", "0");
    hoverDot.setAttribute("opacity", "0");
    tooltipEl.style.opacity = "0";
  }

  hit.addEventListener("pointermove", (e) => {
    const p = nearestPoint(e.clientX);
    showTooltip(e.clientX, e.clientY, p);
  });
  hit.addEventListener("pointerdown", (e) => {
    const p = nearestPoint(e.clientX);
    showTooltip(e.clientX, e.clientY, p);
  });
  hit.addEventListener("pointerleave", hideTooltip);

  container.appendChild(svg);
}

function renderCard(loc) {
  const card = document.createElement("div");
  card.className = "card";

  const readings = loc.readings || [];
  const latest = readings.length ? readings[readings.length - 1] : null;
  const metric = primaryMetric(readings);
  const typeLabel = loc.type === "river" ? "河川" : "ダム";

  const head = document.createElement("div");
  head.className = "card-head";
  const h2 = document.createElement("h2");
  h2.textContent = loc.name;
  const badge = document.createElement("span");
  badge.className = "badge";
  badge.textContent = typeLabel;
  head.appendChild(h2);
  head.appendChild(badge);
  card.appendChild(head);

  const obsTime = document.createElement("div");
  obsTime.className = "obs-time";
  obsTime.textContent = latest ? `観測 ${fmtDateTime(latest.time)}` : "観測データなし";
  card.appendChild(obsTime);

  const statRow = document.createElement("div");
  statRow.className = "stat-row";
  const val = latest ? latest[metric.key] : null;
  statRow.innerHTML = `<span class="stat-value">${fmtNum(val, metric.unit === "%" ? 1 : 2)}</span><span class="stat-unit">${metric.unit}</span>`;
  card.appendChild(statRow);

  const statLabel = document.createElement("div");
  statLabel.className = "stat-label";
  statLabel.textContent = metric.label;
  card.appendChild(statLabel);

  const chartWrap = document.createElement("div");
  chartWrap.className = "chart-wrap";
  const tooltip = document.createElement("div");
  tooltip.className = "tooltip";
  chartWrap.appendChild(tooltip);
  card.appendChild(chartWrap);

  if (readings.length >= 2) {
    buildChart(chartWrap, tooltip, readings, metric);
  } else {
    const note = document.createElement("div");
    note.className = "empty-note";
    note.textContent = "データを蓄積中（数回分の更新が必要です）";
    chartWrap.appendChild(note);
  }

  // secondary numeric stats
  if (latest) {
    const subItems = [];
    if (latest.inflow_m3s !== null && latest.inflow_m3s !== undefined)
      subItems.push(["流入量", fmtNum(latest.inflow_m3s) + " m³/s"]);
    if (latest.outflow_m3s !== null && latest.outflow_m3s !== undefined)
      subItems.push(["放流量", fmtNum(latest.outflow_m3s) + " m³/s"]);
    if (latest.rainfall_mm !== null && latest.rainfall_mm !== undefined)
      subItems.push(["流域雨量", fmtNum(latest.rainfall_mm) + " mm"]);
    if (subItems.length) {
      const sub = document.createElement("div");
      sub.className = "sub-stats";
      for (const [label, value] of subItems) {
        const item = document.createElement("span");
        item.className = "item";
        const b = document.createElement("b");
        b.textContent = value;
        item.appendChild(document.createTextNode(label + " "));
        item.appendChild(b);
        sub.appendChild(item);
      }
      card.appendChild(sub);
    }

    if (latest.weather) {
      const w = latest.weather;
      const [desc, icon] = WEATHER_MAP[w.weather_code] || ["―", "🌡️"];
      const wRow = document.createElement("div");
      wRow.className = "weather-row";
      const parts = [];
      if (w.temp_c !== null && w.temp_c !== undefined) parts.push(`${fmtNum(w.temp_c, 1)}℃`);
      if (w.precip_mm !== null && w.precip_mm !== undefined) parts.push(`降水 ${fmtNum(w.precip_mm, 1)}mm`);
      if (w.wind_speed_ms !== null && w.wind_speed_ms !== undefined) parts.push(`風 ${fmtNum(w.wind_speed_ms, 1)}m/s`);
      wRow.innerHTML = `<span class="icon">${icon}</span><span>${desc}　${parts.join("　")}</span>`;
      card.appendChild(wRow);
    }
  }

  return card;
}

async function main() {
  const grid = document.getElementById("grid");
  const updatedAtEl = document.getElementById("updated-at");

  let index;
  try {
    index = await fetch("data/index.json", { cache: "no-store" }).then(r => r.json());
  } catch (e) {
    grid.innerHTML = '<div class="empty-note">データの読み込みに失敗しました。しばらくしてから再読み込みしてください。</div>';
    return;
  }

  updatedAtEl.textContent = `最終更新: ${fmtDateTime(index.updated_at)}`;

  grid.innerHTML = "";
  for (const locMeta of index.locations) {
    try {
      const loc = await fetch(`data/${locMeta.id}.json`, { cache: "no-store" }).then(r => r.json());
      grid.appendChild(renderCard(loc));
    } catch (e) {
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `<div class="card-head"><h2>${locMeta.name}</h2></div><div class="empty-note">読み込み失敗</div>`;
      grid.appendChild(card);
    }
  }
}

main();
</script>
